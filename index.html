<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <title>perpustakaan digital | Perpustakaan Digital</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <header>
        <h1>perpustakaan Nasional</h1>
        <p>Akses Ilmu Pengetahuan Tanpa Batas</p>
    </header>

    <nav>
        <ul>
            <li><a href="#koleksi">Koleksi Buku</a></li>
            <li><a href="#pinjam">Form Peminjaman</a></li>
        </ul>
    </nav>

    <main>
        <section id="koleksi">
            <h2>Koleksi Unggulan</h2>
            <div id="book-container" class="card-wrapper">
                </div>
        </section>

        <hr>

        <section id="pinjam">
            <h2>Form Peminjaman Buku</h2>
            <form id="loanForm">
                <div class="form-group">
                    <label>Nama Lengkap:</label>
                    <input type="text" id="name" name="name" required>
                    <span class="error" id="nameError"></span>
                </div>

                <div class="form-group">
                    <label>Email:</label>
                    <input type="email" id="email" name="email" required>
                    <span class="error" id="emailError"></span>
                </div>

                <div class="form-group">
                    <label>Jumlah Buku (Angka):</label>
                    <input type="number" id="quantity" name="quantity" required>
                    <span class="error" id="qtyError"></span>
                </div>

                <div class="form-group">
                    <label>Kategori Buku:</label>
                    <select id="category" required>
                        <option value="">-- Pilih Kategori --</option>
                        <option value="teknologi">Teknologi</option>
                        <option value="sains">Sains</option>
                        <option value="fiksi">Fiksi</option>
                    </select>
                </div>

                <div class="form-group">
                    <label>Metode Notifikasi:</label>
                    <div class="radio-group">
                        <input type="radio" name="notify" value="WA" checked> WhatsApp
                        <input type="radio" name="notify" value="Email"> Email
                    </div>
                </div>

                <button type="submit">Kirim Peminjaman</button>
            </form>
        </section>
    </main>

    <footer>
        <p>&copy; 2026 Universitas Muhammadiyah Sumatera Utara - Fakultas Ilmu Komputer</p>
    </footer>

    <script src="script.js"></script>
</body>
</html>
